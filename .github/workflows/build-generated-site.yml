name: Build Generated Site

on:
  push:
    branches:
      - main
    paths:
      - "content/field-manuals/**"
      - "website/admin/**"
      - "website/scripts/**"
      - "package.json"
      - "package-lock.json"
      - "website/package.json"
      - "website/package-lock.json"

permissions:
  contents: write

concurrency:
  group: build-generated-site-main
  cancel-in-progress: false

jobs:
  regenerate:
    if: ${{ github.event.head_commit.message != 'Regenerate static site after CMS publish' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Generate Field Manuals
        run: npm run build:manuals

      - name: Verify generated manual outputs
        run: |
          test -f website/manuales/index.html
          test -f website/sitemap.xml
          test -f website/rss.xml
          manual_count="$(find content/field-manuals -maxdepth 1 -type f -name '*.md' | wc -l | tr -d ' ')"
          page_count="$(find website/manuales -mindepth 2 -maxdepth 2 -name index.html | wc -l | tr -d ' ')"
          echo "Field Manual source files: ${manual_count}"
          echo "Generated manual pages: ${page_count}"
          if [ "${manual_count}" != "${page_count}" ]; then
            echo "Generated manual page count does not match source manual count."
            exit 1
          fi

      - name: Commit regenerated static files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/manuales website/sitemap.xml website/rss.xml
          if git diff --cached --quiet; then
            echo "No generated static files changed."
            exit 0
          fi
          git commit -m "Regenerate static site after CMS publish"
          git push origin main

name: Build Generated Site

on:
  push:
    branches:
      - main
    paths:
      - "content/field-manuals/**"
      - "website/admin/**"
      - "website/scripts/**"
      - "package.json"
      - "package-lock.json"
      - "website/package.json"
      - "website/package-lock.json"

permissions:
  contents: write

concurrency:
  group: build-generated-site-main
  cancel-in-progress: false

jobs:
  regenerate:
    if: ${{ github.event.head_commit.message != 'Regenerate static site after CMS publish' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build generated site
        run: npm run build

      - name: Check generated site
        run: npm run check

      - name: Commit regenerated static files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/manuales website/sitemap.xml website/rss.xml
          if git diff --cached --quiet; then
            echo "No generated static files changed."
            exit 0
          fi
          git commit -m "Regenerate static site after CMS publish"
          git push origin main
